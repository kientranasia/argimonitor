services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argimonitor-backend
    working_dir: /app
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "sqlite:////app/agrimonitor.db"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SUBMIT_BASIC_USER: "${SUBMIT_BASIC_USER:-submit_admin}"
      SUBMIT_BASIC_PASSWORD: "${SUBMIT_BASIC_PASSWORD:-change_me_submit}"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "${VITE_API_BASE:-/api}"
    container_name: argimonitor-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8085}:80"
    depends_on:
      - backend

  crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argimonitor-crawler
    working_dir: /app
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "sqlite:////app/agrimonitor.db"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      CRAWLER_INTERVAL_SECONDS: "${CRAWLER_INTERVAL_SECONDS:-1800}"
      CRAWLER_INITIAL_BACKFILL_DAYS: "${CRAWLER_INITIAL_BACKFILL_DAYS:-30}"
    volumes:
      - ./backend:/app
    command: sh /app/run_crawler_loop.sh
